<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 Pomodoro Timer</title>
<style>
  /* ========== CSS Variables ========== */
  :root {
    --bg: #1a1b26;
    --card-bg: #24253a;
    --card-border: #2f3154;
    --text: #c0caf5;
    --text-muted: #565f89;
    --text-bright: #e0e2f4;
    --work: #f7768e;
    --work-glow: rgba(247, 118, 142, 0.25);
    --short-break: #9ece6a;
    --short-break-glow: rgba(158, 206, 106, 0.25);
    --long-break: #7aa2f7;
    --long-break-glow: rgba(122, 162, 247, 0.25);
    --btn-bg: #2f3154;
    --btn-hover: #3b3d68;
    --toggle-bg: #3b3d68;
    --toggle-active: #565f89;
    --ring-bg: #2f3154;
    --radius: 16px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ========== Reset & Base ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ========== App Container ========== */
  .app {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 40px 36px 32px;
    width: 420px;
    max-width: 95vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.03);
    position: relative;
  }

  /* ========== Header ========== */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }
  .header-icon { font-size: 28px; }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  /* ========== Timer Ring ========== */
  .timer-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .timer-ring {
    transform: rotate(-90deg);
    width: 280px;
    height: 280px;
  }
  .ring-bg {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 10;
  }
  .ring-progress {
    fill: none;
    stroke: var(--work);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear, stroke var(--transition);
  }
  .timer-display {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .timer-time {
    font-size: 64px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    color: var(--text-bright);
    line-height: 1;
  }
  .timer-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ========== Mode Tabs ========== */
  .mode-tabs {
    display: flex;
    gap: 6px;
    background: var(--btn-bg);
    border-radius: 12px;
    padding: 4px;
    width: 100%;
  }
  .mode-tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    font-family: inherit;
  }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active {
    background: var(--toggle-active);
    color: var(--text-bright);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }
  .mode-tab[data-mode="pomodoro"].active { color: var(--work); }
  .mode-tab[data-mode="shortBreak"].active { color: var(--short-break); }
  .mode-tab[data-mode="longBreak"].active { color: var(--long-break); }

  /* ========== Task Input ========== */
  .task-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition);
    font-family: inherit;
  }
  .task-input:focus { border-color: var(--toggle-active); }
  .task-input::placeholder { color: var(--text-muted); }

  /* ========== Controls ========== */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .btn {
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-family: inherit;
  }
  .btn-play {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--work);
    color: #1a1b26;
    font-size: 22px;
    box-shadow: 0 4px 20px var(--work-glow);
  }
  .btn-play:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px var(--work-glow);
  }
  .btn-play:active { transform: scale(0.96); }
  .btn-play.paused { background: var(--short-break); box-shadow: 0 4px 20px var(--short-break-glow); }
  .btn-play.paused:hover { box-shadow: 0 6px 28px var(--short-break-glow); }
  .btn-secondary {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--btn-bg);
    color: var(--text-muted);
    font-size: 16px;
  }
  .btn-secondary:hover {
    background: var(--btn-hover);
    color: var(--text);
  }
  .btn-secondary:active { transform: scale(0.93); }

  /* ========== Session Dots ========== */
  .session-tracker {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .session-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--btn-bg);
    transition: all var(--transition);
  }
  .session-dot.done { background: var(--work); box-shadow: 0 0 8px var(--work-glow); }
  .session-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 4px;
    font-weight: 500;
  }

  /* ========== Settings ========== */
  .settings-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-family: inherit;
  }
  .settings-toggle:hover { color: var(--text); background: var(--btn-bg); }
  .settings-panel {
    width: 100%;
    background: var(--btn-bg);
    border-radius: 14px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .settings-panel.open { display: flex; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .setting-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .setting-input {
    width: 72px;
    padding: 6px 10px;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 13px;
    text-align: center;
    outline: none;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
  }
  .setting-input:focus { border-color: var(--toggle-active); }
  .toggle-switch {
    position: relative;
    width: 46px;
    height: 26px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border-radius: 26px;
    cursor: pointer;
    transition: all var(--transition);
    border: 1px solid var(--card-border);
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    left: 2px;
    bottom: 2px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: all var(--transition);
  }
  input:checked + .toggle-slider { background: var(--work); border-color: var(--work); }
  input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

  /* ========== Responsive ========== */
  @media (max-width: 440px) {
    .app { padding: 28px 20px 24px; border-radius: 20px; }
    .timer-wrapper { width: 220px; height: 220px; }
    .timer-ring { width: 220px; height: 220px; }
    .timer-time { font-size: 48px; }
    .mode-tab { font-size: 11px; padding: 8px 4px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Settings gear -->
  <button class="settings-toggle" id="settingsToggle" title="Settings">⚙️</button>

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🍅</span>
    <span class="header-title">Pomodoro</span>
  </div>

  <!-- Timer -->
  <div class="timer-wrapper">
    <svg class="timer-ring" viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="130"/>
      <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="130"
              stroke-dasharray="816.81" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-display">
      <span class="timer-time" id="timerTime">25:00</span>
      <span class="timer-label" id="timerLabel">Focus</span>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="pomodoro">🍅 Focus</button>
    <button class="mode-tab" data-mode="shortBreak">☕ Short Break</button>
    <button class="mode-tab" data-mode="longBreak">🌴 Long Break</button>
  </div>

  <!-- Task input -->
  <input type="text" class="task-input" id="taskInput"
         placeholder="What are you working on?" maxlength="80">

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-secondary" id="btnReset" title="Reset (R)">↺</button>
    <button class="btn btn-play" id="btnPlay" title="Start / Pause (Space)">▶</button>
    <button class="btn btn-secondary" id="btnSkip" title="Skip (→)">⏭</button>
  </div>

  <!-- Session tracker -->
  <div class="session-tracker" id="sessionTracker">
    <span class="session-dot"></span>
    <span class="session-dot"></span>
    <span class="session-dot"></span>
    <span class="session-dot"></span>
    <span class="session-count" id="sessionCount">0 / 4</span>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">🍅 Focus (min)</span>
      <input type="number" class="setting-input" id="setPomodoro" min="1" max="120" value="25">
    </div>
    <div class="setting-row">
      <span class="setting-label">☕ Short Break (min)</span>
      <input type="number" class="setting-input" id="setShortBreak" min="1" max="30" value="5">
    </div>
    <div class="setting-row">
      <span class="setting-label">🌴 Long Break (min)</span>
      <input type="number" class="setting-input" id="setLongBreak" min="1" max="60" value="15">
    </div>
    <div class="setting-row">
      <span class="setting-label">Long break after</span>
      <input type="number" class="setting-input" id="setInterval" min="1" max="10" value="4">
    </div>
    <div class="setting-row">
      <span class="setting-label">🔔 Sound</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setSound" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <span class="setting-label">🔔 Notifications</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setNotifications" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <span class="setting-label">🔄 Auto-start Breaks</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setAutoBreaks" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <span class="setting-label">🔄 Auto-start Focus</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setAutoPomodoros">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  Pomodoro Timer — Application Logic
// ═══════════════════════════════════════════

// ── DOM refs ──
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const el = {
  timerTime: $('#timerTime'),
  timerLabel: $('#timerLabel'),
  ringProgress: $('#ringProgress'),
  btnPlay: $('#btnPlay'),
  btnReset: $('#btnReset'),
  btnSkip: $('#btnSkip'),
  modeTabs: $('#modeTabs'),
  taskInput: $('#taskInput'),
  sessionTracker: $('#sessionTracker'),
  sessionCount: $('#sessionCount'),
  settingsToggle: $('#settingsToggle'),
  settingsPanel: $('#settingsPanel'),
  setPomodoro: $('#setPomodoro'),
  setShortBreak: $('#setShortBreak'),
  setLongBreak: $('#setLongBreak'),
  setInterval: $('#setInterval'),
  setSound: $('#setSound'),
  setNotifications: $('#setNotifications'),
  setAutoBreaks: $('#setAutoBreaks'),
  setAutoPomodoros: $('#setAutoPomodoros'),
};

// ── Config (seconds) ──
const CFG = {
  pomodoro: 25 * 60,
  shortBreak: 5 * 60,
  longBreak: 15 * 60,
  longBreakInterval: 4,
  autoStartBreaks: true,
  autoStartPomodoros: false,
  sound: true,
  notifications: true,
};

// ── Runtime state ──
let mode = 'pomodoro';        // 'pomodoro' | 'shortBreak' | 'longBreak'
let runState = 'idle';        // 'idle' | 'running' | 'paused'
let remaining = CFG.pomodoro;
let targetEnd = null;         // Date.now() + remaining*1000 when running
let intervalId = null;
let sessionCount = 0;         // completed pomodoros in current cycle

// ── Audio ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playChime() {
  if (!CFG.sound) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // Pleasant three-note chime: C5 → E5 → G5
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.18);
      gain.gain.linearRampToValueAtTime(0.3, now + i * 0.18 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.35);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.4);
    });
  } catch (_) { /* Audio not supported */ }
}

// ── Notifications ──
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function showNotification(title, body) {
  if (!CFG.notifications) return;
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '🍅', silent: true });
  }
}

// ── Persistence ──
const STORAGE_KEY = 'pomodoro-timer-settings';

function saveSettings() {
  const data = {
    ...CFG,
    mode,
    sessionCount,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (_) {}
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (typeof data.pomodoro === 'number') CFG.pomodoro = data.pomodoro;
    if (typeof data.shortBreak === 'number') CFG.shortBreak = data.shortBreak;
    if (typeof data.longBreak === 'number') CFG.longBreak = data.longBreak;
    if (typeof data.longBreakInterval === 'number') CFG.longBreakInterval = data.longBreakInterval;
    if (typeof data.autoStartBreaks === 'boolean') CFG.autoStartBreaks = data.autoStartBreaks;
    if (typeof data.autoStartPomodoros === 'boolean') CFG.autoStartPomodoros = data.autoStartPomodoros;
    if (typeof data.sound === 'boolean') CFG.sound = data.sound;
    if (typeof data.notifications === 'boolean') CFG.notifications = data.notifications;
    if (typeof data.mode === 'string') mode = data.mode;
    if (typeof data.sessionCount === 'number') sessionCount = data.sessionCount % CFG.longBreakInterval;
  } catch (_) { /* ignore */ }
}

// ── Timer engine ──
function getTotalSeconds() {
  return CFG[mode] || CFG.pomodoro;
}

function resetToMode(m) {
  mode = m;
  runState = 'idle';
  remaining = getTotalSeconds();
  targetEnd = null;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  updateAll();
  saveSettings();
}

function start() {
  requestNotificationPermission();

  if (runState === 'paused') {
    // Resume
    runState = 'running';
    targetEnd = Date.now() + remaining * 1000;
    startInterval();
    updateAll();
    return;
  }

  // Fresh start
  if (remaining <= 0) remaining = getTotalSeconds();
  runState = 'running';
  targetEnd = Date.now() + remaining * 1000;
  startInterval();
  updateAll();
}

function pause() {
  runState = 'paused';
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  // remaining stays as-is (already computed in tick)
  targetEnd = null;
  updateAll();
}

function reset() {
  remaining = getTotalSeconds();
  runState = 'idle';
  targetEnd = null;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  updateAll();
}

function skip() {
  // Skip current session (mark as complete without waiting)
  if (runState === 'running') {
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    runState = 'idle';
  }
  remaining = 0;
  targetEnd = null;
  handleCompletion();
}

function startInterval() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(tick, 200); // 5 updates/sec for smooth ring
}

function tick() {
  if (!targetEnd) return;

  const now = Date.now();
  const diff = Math.max(0, targetEnd - now);
  remaining = Math.ceil(diff / 1000);

  updateTimerDisplay();
  updateRing();

  if (remaining <= 0) {
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    runState = 'idle';
    targetEnd = null;
    handleCompletion();
  }
}

function handleCompletion() {
  remaining = 0;
  updateAll();

  if (mode === 'pomodoro') {
    sessionCount++;
    playChime();
    showNotification('🍅 Pomodoro Complete!', 'Great work! Time for a break.');
    el.taskInput.value = '';

    // Determine next mode
    const nextMode = (sessionCount > 0 && sessionCount % CFG.longBreakInterval === 0)
      ? 'longBreak'
      : 'shortBreak';

    if (CFG.autoStartBreaks) {
      setTimeout(() => switchMode(nextMode, true), 800);
    } else {
      switchMode(nextMode);
    }
  } else {
    // Break complete
    playChime();
    showNotification('☕ Break Over!', 'Ready to focus again?');

    if (CFG.autoStartPomodoros) {
      setTimeout(() => switchMode('pomodoro', true), 800);
    } else {
      switchMode('pomodoro');
    }
  }

  saveSettings();
}

function switchMode(m, autoStart = false) {
  mode = m;
  remaining = getTotalSeconds();
  runState = 'idle';
  targetEnd = null;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  updateAll();
  saveSettings();

  if (autoStart) {
    start();
  }
}

// ── UI updates ──
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function updateTimerDisplay() {
  el.timerTime.textContent = formatTime(remaining);
  // Update browser tab title
  const label = modeLabels[mode];
  document.title = `${formatTime(remaining)} — ${label}`;
}

function updateRing() {
  const total = getTotalSeconds();
  const progress = total > 0 ? remaining / total : 0;
  const circumference = 2 * Math.PI * 130; // r=130
  const offset = circumference * (1 - progress);
  el.ringProgress.setAttribute('stroke-dashoffset', offset);
}

function updateRingColor() {
  const colors = {
    pomodoro: '#f7768e',
    shortBreak: '#9ece6a',
    longBreak: '#7aa2f7',
  };
  el.ringProgress.style.stroke = colors[mode] || colors.pomodoro;

  // Update play button color
  el.btnPlay.classList.remove('paused');
  if (mode === 'shortBreak' || mode === 'longBreak') {
    el.btnPlay.classList.add('paused');
  }
}

const modeLabels = {
  pomodoro: 'Focus',
  shortBreak: 'Short Break',
  longBreak: 'Long Break',
};

function updateAll() {
  updateTimerDisplay();
  updateRing();
  updateRingColor();
  updateModeTabs();
  updatePlayButton();
  updateSessionDots();
  updateTimerLabel();
}

function updateModeTabs() {
  $$('.mode-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
}

function updatePlayButton() {
  if (runState === 'running') {
    el.btnPlay.innerHTML = '⏸';
    el.btnPlay.title = 'Pause (Space)';
  } else {
    el.btnPlay.innerHTML = '▶';
    el.btnPlay.title = 'Start (Space)';
  }
}

function updateTimerLabel() {
  el.timerLabel.textContent = modeLabels[mode] || 'Focus';
}

function updateSessionDots() {
  const interval = CFG.longBreakInterval;
  // Rebuild dots
  let html = '';
  for (let i = 0; i < interval; i++) {
    const done = i < (sessionCount % interval);
    html += `<span class="session-dot${done ? ' done' : ''}"></span>`;
  }
  el.sessionTracker.innerHTML = html + `<span class="session-count">${sessionCount % interval} / ${interval}</span>`;
  el.sessionCount = el.sessionTracker.querySelector('.session-count');
}

// ── Settings ──
function syncUISettings() {
  el.setPomodoro.value = CFG.pomodoro / 60;
  el.setShortBreak.value = CFG.shortBreak / 60;
  el.setLongBreak.value = CFG.longBreak / 60;
  el.setInterval.value = CFG.longBreakInterval;
  el.setSound.checked = CFG.sound;
  el.setNotifications.checked = CFG.notifications;
  el.setAutoBreaks.checked = CFG.autoStartBreaks;
  el.setAutoPomodoros.checked = CFG.autoStartPomodoros;
}

function applySettings() {
  CFG.pomodoro = Math.max(1, Math.min(120, parseInt(el.setPomodoro.value) || 25)) * 60;
  CFG.shortBreak = Math.max(1, Math.min(30, parseInt(el.setShortBreak.value) || 5)) * 60;
  CFG.longBreak = Math.max(1, Math.min(60, parseInt(el.setLongBreak.value) || 15)) * 60;
  CFG.longBreakInterval = Math.max(1, Math.min(10, parseInt(el.setInterval.value) || 4));
  CFG.sound = el.setSound.checked;
  CFG.notifications = el.setNotifications.checked;
  CFG.autoStartBreaks = el.setAutoBreaks.checked;
  CFG.autoStartPomodoros = el.setAutoPomodoros.checked;

  sessionCount = sessionCount % CFG.longBreakInterval;
  remaining = getTotalSeconds();

  syncUISettings();
  updateAll();
  saveSettings();
}

// ── Event handlers ──
el.btnPlay.addEventListener('click', () => {
  if (runState === 'running') pause();
  else start();
});

el.btnReset.addEventListener('click', reset);
el.btnSkip.addEventListener('click', skip);

el.modeTabs.addEventListener('click', (e) => {
  const tab = e.target.closest('.mode-tab');
  if (!tab) return;
  switchMode(tab.dataset.mode);
});

el.settingsToggle.addEventListener('click', () => {
  el.settingsPanel.classList.toggle('open');
});

// Save settings when panel closes (click outside or toggle off)
el.settingsPanel.addEventListener('change', applySettings);
el.settingsPanel.addEventListener('input', (e) => {
  if (e.target.type === 'number') applySettings();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Space → play/pause (only when not typing in input)
  if (e.code === 'Space' && document.activeElement !== el.taskInput &&
      document.activeElement?.tagName !== 'INPUT' &&
      !el.settingsPanel.contains(document.activeElement)) {
    e.preventDefault();
    if (runState === 'running') pause();
    else start();
  }

  // R → reset
  if (e.code === 'KeyR' && document.activeElement !== el.taskInput &&
      document.activeElement?.tagName !== 'INPUT' &&
      !el.settingsPanel.contains(document.activeElement)) {
    e.preventDefault();
    reset();
  }

  // ArrowRight → skip
  if (e.code === 'ArrowRight' && document.activeElement !== el.taskInput &&
      document.activeElement?.tagName !== 'INPUT' &&
      !el.settingsPanel.contains(document.activeElement)) {
    e.preventDefault();
    skip();
  }
});

// Save task to localStorage
el.taskInput.addEventListener('input', () => {
  try { localStorage.setItem('pomodoro-task', el.taskInput.value); } catch (_) {}
});

// ── Init ──
function init() {
  loadSettings();
  syncUISettings();

  // Restore task
  try {
    const saved = localStorage.getItem('pomodoro-task');
    if (saved) el.taskInput.value = saved;
  } catch (_) {}

  remaining = getTotalSeconds();
  updateAll();
  document.title = '🍅 Pomodoro Timer';
}

init();
console.log('🍅 Pomodoro Timer ready!');
console.log('  Space  → Start / Pause');
console.log('  R      → Reset');
console.log('  →      → Skip session');
</script>

</body>
